name: hysteria-xboard

services:
  hysteria:
    image: ${HYSTERIA_IMAGE:-ghcr.io/dsd1001/hysteria-xboard:latest}
    pull_policy: always
    container_name: hysteria-xboard
    restart: unless-stopped
    network_mode: host
    command:
      - server
      - -c
      - /etc/hysteria/server.yaml
      - --disable-update-check
    volumes:
      - type: bind
        source: ./deploy/xboard/server.yaml
        target: /etc/hysteria/server.yaml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./deploy/xboard/secrets/xboard_token
        target: /run/secrets/xboard_token
        read_only: true
        bind:
          create_host_path: false
      - ./deploy/xboard/data:/var/lib/hysteria
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
