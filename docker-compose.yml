name: hysteria-xboard

services:
  hysteria:
    image: ${HYSTERIA_IMAGE:-ghcr.io/dsd1001/hysteria-xboard:latest}
    pull_policy: always
    container_name: hysteria-xboard
    restart: unless-stopped
    network_mode: host
    command:
      - server
      - -c
      - /etc/hysteria/server.yaml
      - --disable-update-check
    volumes:
      - ./deploy/xboard/server.yaml:/etc/hysteria/server.yaml:ro
      - ./deploy/xboard/secrets/xboard_token:/run/secrets/xboard_token:ro
      - ./deploy/xboard/data:/var/lib/hysteria
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
